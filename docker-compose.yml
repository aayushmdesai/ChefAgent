services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Qdrant__Endpoint=http://qdrant:6334
      - Qdrant__CollectionName=recipes
      - Ollama__Endpoint=http://ollama:11434
      - Ollama__ChatModel=llama3.2
      - Ollama__EmbeddingModel=nomic-embed-text
      - Redis__ConnectionString=redis:6379
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Models persist in ollama-data volume — only pulled once
    # setup.sh handles pulling on first run

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Langfuse — uncomment in Month 3
  # langfuse: ...

volumes:
  qdrant-data:
  ollama-data:
  redis-data: